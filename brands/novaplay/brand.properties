# Default brand: NovaPlay. Every build without -PnovaplayBrand=<slug> uses this pack.
# See brands/README.md for the full guide to creating a provider brand.

# Launcher label and product name shown across the app.
brand.appName=NovaPlay

# Package identity of the installed APK. Every brand MUST use its own id so
# branded builds install side by side and store listings stay separate.
brand.applicationId=com.novaplay.tv

# Accent pair as #RRGGBB: the interaction color and its gradient partner.
brand.accentColor=#22D3EE
brand.accentColorAlt=#8B5CF6

# Whether users may add their own Xtream/M3U sources. Providers who ship a
# managed portal only can set this to false to hide the personal-source entry.
brand.allowPersonalPlaylists=true

# Optional preset portal for managed-provider builds. Release builds require a
# real HTTPS authority; leave unset for the personal-player profile.
# brand.portalBaseUrl=https://portal.example-provider.com

# Optional sideload update channel: an HTTPS URL serving the update manifest
# ({"version_code":..., "version_name":"...", "apk_url":"https://...",
# "notes":"..."}). Leave unset when this brand distributes through a store.
# brand.updateUrl=https://updates.example-provider.com/player.json
