name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build, test, and lint debug and release
        shell: bash
        env:
          NOVAPLAY_PORTAL_BASE_URL: https://portal.ci.invalid
        run: |
          set -o pipefail
          ./gradlew \
            :app:testDebugUnitTest \
            :app:testReleaseUnitTest \
            :app:assembleDebug \
            :app:assembleRelease \
            :app:lintDebug \
            :app:lintRelease \
            --console=plain --quiet --stacktrace 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 7

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: novaplay-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload unsigned release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: novaplay-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload Room schemas
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: room-schemas
          path: app/schemas/**
          if-no-files-found: error
          retention-days: 7
