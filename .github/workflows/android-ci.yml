name: Android CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Test release packaging tool
        run: python3 -m unittest discover -s tools -p 'test_*.py'

      - name: Verify complete release candidate
        shell: bash
        env:
          NOVAPLAY_PORTAL_BASE_URL: https://portal.ci.invalid
        run: |
          set -o pipefail
          ./gradlew :app:verifyReleaseCandidate \
            --console=plain --quiet --stacktrace 2>&1 | tee build.log

      - name: Package release candidate with checksums
        if: success()
        env:
          SOURCE_COMMIT: ${{ github.event.pull_request.head.sha || github.sha }}
          BUILD_COMMIT: ${{ github.sha }}
        run: |
          python3 tools/package_release.py \
            --commit "${SOURCE_COMMIT}" \
            --build-commit "${BUILD_COMMIT}" \
            --output dist/release-candidate

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build.log
          if-no-files-found: error
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: novaplay-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload raw unsigned release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: novaplay-release-unsigned
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload release candidate package
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: novaplay-release-candidate
          path: dist/release-candidate/**
          if-no-files-found: error
          retention-days: 30

      - name: Upload private R8 mapping
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: novaplay-r8-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: error
          retention-days: 30

      - name: Upload lint reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-reports
          path: app/build/reports/lint-results-*.html
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Room schemas
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: room-schemas
          path: app/schemas/**
          if-no-files-found: error
          retention-days: 30
